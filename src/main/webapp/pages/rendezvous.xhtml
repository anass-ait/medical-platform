<ui:composition template="/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="content">

        <div class="hero" style="min-height: 90vh; display:flex; align-items:center; justify-content:center;">

            <div class="card" style="width:420px;">

                <h2 style="text-align:center; margin-bottom:25px;">
                    Prendre un rendez-vous 📅
                </h2>

                <h:form style="text-align:left;">

                    <!-- ID médecin -->
                    <div style="margin-bottom:15px;">
                        <label class="form-label">Médecin ID</label>
                        <h:outputText value="#{rendezVousController.medecinId}" />
                    </div>

                    <!-- DATE -->
                    <div style="margin-bottom:15px;">
                        <label class="form-label">Date</label>
                        <h:inputText value="#{rendezVousController.date}"
                                     styleClass="input"/>
                    </div>

                    <!-- HEURE -->
                    <div style="margin-bottom:20px;">
                        <label class="form-label">Heure</label>
                        <h:inputText value="#{rendezVousController.heure}"
                                     styleClass="input"/>
                    </div>

                    <!-- BOUTON -->
                    <div style="text-align:center;">
                        <h:commandButton value="Confirmer"
                                         action="#{rendezVousController.save}"
                                         styleClass="btn-primary btn-large"/>
                    </div>

                </h:form>

            </div>

        </div>

    </ui:define>

</ui:composition>
