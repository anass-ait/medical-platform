<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>
    <title>Prendre Rendez-vous</title>
</h:head>

<h:body>

    <h2>Prendre un rendez-vous</h2>

    <h:form>

        <!-- ID médecin -->
        <h:outputText value="Médecin ID: #{rendezVousController.medecinId}" />
        <br/><br/>

        <!-- DATE -->
        Date :
        <h:inputText value="#{rendezVousController.date}" />
        <br/><br/>

        <!-- HEURE -->
        Heure :
        <h:inputText value="#{rendezVousController.heure}" />
        <br/><br/>

        <!-- BOUTON -->
        <h:commandButton value="Confirmer"
                         action="#{rendezVousController.save}" />

    </h:form>

</h:body>
</html>
