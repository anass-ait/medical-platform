<ui:composition template="/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="content">

        <div class="section">

            <h1 style="text-align:center; margin-bottom:30px;">
                Dashboard Médecin 👨‍⚕️
            </h1>

            <div style="max-width:1200px; margin:0 auto;">

                <h2 style="margin-bottom:20px;">Mes Rendez-vous</h2>

                <h:dataTable value="#{rendezVousController.rendezVousMedecin}"
                             var="r"
                             styleClass="table">

                    <h:column>
                        <f:facet name="header">Patient</f:facet>
                        #{r.patient.utilisateur.nom}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Date</f:facet>
                        #{r.dateHeure}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Statut</f:facet>
                        #{r.statut}
                    </h:column>

                    <!-- ACTIONS -->
                    <h:column>
                        <f:facet name="header">Action</f:facet>

                        <h:form style="display:flex; gap:10px;">
                            <h:commandButton value="✔"
                                             action="#{rendezVousController.confirmer(r)}"
                                             styleClass="btn-primary"/>

                            <h:commandButton value="✖"
                                             action="#{rendezVousController.annuler(r)}"
                                             styleClass="btn-outline"/>
                        </h:form>

                    </h:column>

                </h:dataTable>

            </div>

        </div>

    </ui:define>

</ui:composition>
