<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Dashboard Médecin</title>
</h:head>

<h:body>

    <h1>Dashboard Médecin 👨‍⚕️</h1>

    <h2>Mes Rendez-vous</h2>

    <h:dataTable value="#{rendezVousController.rendezVousMedecin}" var="r" border="1">

        <h:column>
            <f:facet name="header">Patient</f:facet>
            #{r.patient.utilisateur.nom}
        </h:column>

        <h:column>
            <f:facet name="header">Date</f:facet>
            #{r.dateHeure}
        </h:column>

        <h:column>
            <f:facet name="header">Statut</f:facet>
            #{r.statut}
        </h:column>

        <!-- 🔥 ACTIONS -->
        <h:column>
            <f:facet name="header">Action</f:facet>

            <h:form>
                <h:commandButton value="✔ Confirmer"
                                 action="#{rendezVousController.confirmer(r)}" />
                <h:commandButton value="❌ Annuler"
                                 action="#{rendezVousController.annuler(r)}" />
            </h:form>

        </h:column>

    </h:dataTable>

</h:body>
</html>
