<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Dashboard Patient</title>
</h:head>

<h:body>

    <h1>Dashboard Patient 🚀</h1>

    <h2>Mes Rendez-vous</h2>

    <h:dataTable value="#{rendezVousController.mesRendezVous}" var="r" border="1">

        <h:column>
            <f:facet name="header">Date</f:facet>
            #{r.dateHeure}
        </h:column>

        <h:column>
            <f:facet name="header">Statut</f:facet>
            #{r.statut}
        </h:column>

        <h:column>
            <f:facet name="header">Médecin ID</f:facet>
            #{r.medecin.idMedecin}
        </h:column>

    </h:dataTable>

</h:body>
</html>
