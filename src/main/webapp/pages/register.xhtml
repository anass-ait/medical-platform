<ui:composition template="/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="content">

        <div class="hero" style="min-height: 90vh; display:flex; align-items:center; justify-content:center;">

            <div class="card" style="width:420px; text-align:center;">

                <h2 style="margin-bottom:25px;">Créer un compte</h2>

                <h:form style="text-align:left;">

                    <div style="margin-bottom:15px;">
                        <label class="form-label">Nom</label>
                        <h:inputText value="#{registerController.nom}" styleClass="input"/>
                    </div>

                    <div style="margin-bottom:15px;">
                        <label class="form-label">Prénom</label>
                        <h:inputText value="#{registerController.prenom}" styleClass="input"/>
                    </div>

                    <div style="margin-bottom:15px;">
                        <label class="form-label">Email</label>
                        <h:inputText value="#{registerController.email}" styleClass="input"/>
                    </div>

                    <div style="margin-bottom:20px;">
                        <label class="form-label">Mot de passe</label>
                        <h:inputSecret value="#{registerController.motDePasse}" styleClass="input"/>
                    </div>

                    <div style="text-align:center;">
                        <h:commandButton value="S'inscrire"
                                         action="#{registerController.register}"
                                         styleClass="btn-primary btn-large"/>
                    </div>

                </h:form>

            </div>

        </div>

    </ui:define>

</ui:composition>
