<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Médecins</title>
</h:head>

<h:body>

    <h2>Liste des médecins</h2>

    <h:dataTable value="#{medecinController.medecins}" var="m" border="1">

        <h:column>
            <f:facet name="header">Nom</f:facet>
            #{m.utilisateur.nom}
        </h:column>

        <h:column>
            <f:facet name="header">Prénom</f:facet>
            #{m.utilisateur.prenom}
        </h:column>

        <h:column>
            <f:facet name="header">Email</f:facet>
            #{m.utilisateur.email}
        </h:column>

        <h:column>
            <f:facet name="header">Action</f:facet>

            <h:form>
                <h:commandButton value="Prendre RDV"
                                 action="#{rendezVousController.goToRdv(m.idMedecin)}" />
            </h:form>

        </h:column>

    </h:dataTable>

</h:body>
</html>
