<ui:composition template="/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="content">

        <div class="section">

            <h1 style="text-align:center; margin-bottom:30px;">
                Dashboard Patient 🚀
            </h1>

            <!-- BOUTON -->
            <div style="text-align:center; margin-bottom:40px;">
                <h:form>
                    <h:commandButton value="➕ Prendre un rendez-vous"
                                     action="doctors.xhtml?faces-redirect=true"
                                     styleClass="btn-primary btn-large"/>
                </h:form>
            </div>

            <!-- TABLE -->
            <div style="max-width:1200px; margin:0 auto;">                <h2 style="margin-bottom:20px;">Mes Rendez-vous</h2>

                <h:dataTable value="#{rendezVousController.mesRendezVous}"
                             var="r"
                             styleClass="table"
                             style="width:100%;">
                    <h:column>
                        <f:facet name="header">Date</f:facet>
                        #{r.dateHeure}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Statut</f:facet>
                        #{r.statut}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Médecin</f:facet>
                        #{r.medecin.utilisateur.nom}
                    </h:column>

                </h:dataTable>

            </div>

        </div>

    </ui:define>

</ui:composition>
