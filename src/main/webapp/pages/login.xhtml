<ui:composition template="/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="content">

        <div class="hero" style="min-height: 80vh; display:flex; align-items:center; justify-content:center;">

            <div class="card" style="width:400px; text-align:center;">

                <h2 style="margin-bottom:20px;">Connexion</h2>

                <h:form>

                    <div style="margin-bottom:15px;">
                        <h:inputText value="#{loginController.email}"
                                     styleClass="input"
                                     placeholder="Email" />
                    </div>

                    <div style="margin-bottom:20px;">
                        <h:inputSecret value="#{loginController.motDePasse}"
                                       styleClass="input"
                                       placeholder="Mot de passe" />
                    </div>

                    <h:commandButton value="Se connecter"
                                     action="#{loginController.login}"
                                     styleClass="btn-primary btn-large"/>

                </h:form>

            </div>

        </div>

    </ui:define>

</ui:composition>
